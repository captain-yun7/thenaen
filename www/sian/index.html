

<!DOCTYPE HTML>
<html lang="ko">

<head>
    <title>더나은 호흡 로고 시안</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            text-decoration: none;
            font-family: 'Noto Sans KR', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap');



        .container {
            margin: 0 auto;
            margin-bottom: 100px;
            width: 800px;
        }

        .container::after {
            content: "";
            display: table;
            clear: both;
        }



        .img_area::-webkit-scrollbar {
            display: none;
        }

        .img_area {
            width: 360px;
            height: auto;
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.2);
            /*            overflow-y: scroll;*/
        }

        .img_area img {
            max-width: 360px;
            width: 100%;
            height: auto;
        }


        .sian_area_00 {
            float: left;
            margin: 0 auto;
            margin-top: 100px;
        }

        .sian_area_00:nth-child(odd) {
            margin-right: 60px;
        }

        .sian_area_00 p {
            text-align: center;
            font-size: 20px;
            margin: 0 auto;
            margin-bottom: 20px;
            width: 260px;
            height: 40px;
            line-height: 40px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 999px;
        }

        .sian_area_00 p.info {
            text-align: center;
            font-size: 20px;
            margin: 0 auto;
            margin-bottom: 20px;
            width: 260px;
            height: 40px;
            line-height: 40px;
            box-sizing: border-box;
            border-radius: 999px;
            background: #ccc;
            color: #000;
            font-weight: bold;
        }







        .img_area_00::-webkit-scrollbar {
            display: none;
        }

        .img_area_00 {
            margin: 0 auto;
            width: 360px;
            height: auto;
            /*            overflow-y: scroll;*/
        }

        .img_area_00 img {
            max-width: 360px;
            width: 100%;
            height: auto;
            box-shadow: 0px 6px 16px rgba(0, 0, 0, 0.3);
        }

        .logo {
            width: 700px;
            height: auto;
            margin: 0 auto;
        }

        .logo p {
            text-align: center;
            font-size: 20px;
            margin: 100px auto;
            margin-bottom: 20px;
            width: 260px;
            height: 40px;
            line-height: 40px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 999px;
        }

        .logo .logo2 {
            width: 100%;
            height: auto;
            margin-bottom: 0px;
        }

        .logo .logo2 img {
            width: 100%;
            height: auto;
            display: block;
        }


        .main_title {
            margin: 0 auto;
            margin-top: 50px;
            margin-bottom: 30px;
            width: 300px;
            padding: 12px 12px;
            border-radius: 999px;
            border: 1px solid #ddd;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>
<!--로고-->
<div class="container">
        <div class="sian_area_00">
            <p>로고1</p>
            <div class="img_area_00">
                <img src="img/00.png">
            </div>
        </div>
        <div class="sian_area_00">
            <p>로고2</p>
            <div class="img_area_00">
                <img src="img/01.png">
            </div>
        </div>
        <div class="sian_area_00">
            <p>로고3</p>
            <div class="img_area_00">
                <img src="img/02.png">
            </div>
        </div>
</div>
  

  


</body>

</html>
